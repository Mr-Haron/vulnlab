events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format vulnlab '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log vulnlab;

    upstream app     { server app:3000; }
    upstream admin   { server admin:4000; }

    server {
        listen 80;
        server_name _;

        # ── Admin panel ───────────────────────────────────────────────────────
        location /admin/ {
            proxy_pass         http://admin/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Main vulnerable app (everything else) ─────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Allow large uploads for the upload lab
            client_max_body_size 10m;
        }
    }
}
